name: terraform-aws
on:
  workflow_call:
    inputs:
      enable_aqua_cache:
        type: boolean
        required: false
        default: false
      working_directory:
        type: string
        required: false
        default: "."
      iam_role:
        description: "(Deprecated) Use 'iam_role_plan' and 'iam_role_apply' instead. Will be removed in a future version."
        type: string
        required: false
      iam_role_plan:
        description: "AWS IAM role ARN for terraform plan"
        type: string
        required: false
      iam_role_apply:
        description: "AWS IAM role ARN for terraform apply"
        type: string
        required: false
      region:
        type: string
        required: true
      identifier:
        type: string
        required: true
      terraform_version_file:
        type: string
        required: false
        default: ".terraform-version" # use 'latest' if not exists
      save_tfplan:
        type: boolean
        required: false
        default: false
      tfplan_retention_days:
        type: number
        required: false
        default: 1
      configure_git_credentials:
        description: "Configure git credentials for private modules using GITHUB_TOKEN"
        type: boolean
        required: false
        default: false
    outputs:
      tfplan_artifact_name:
        description: "Name of the artifact containing terraform plan JSON"
        value: ${{ jobs.terraform.outputs.tfplan_artifact_name }}

concurrency:
  group: ${{ github.workflow }}-${{ inputs.identifier }}
  cancel-in-progress: false

jobs:
  terraform:
    permissions:
      issues: write # allow to create repo label
      contents: read
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      tfplan_artifact_name: ${{ steps.plan.outputs.tfplan_artifact_name }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: inputs.enable_aqua_cache
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-

      - name: install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.51.2

      - name: install tfcmt via aqua
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        run: |
          if [ ! -f aqua.yaml ];then
            aqua init
            aqua g -i suzuki-shunsuke/tfcmt
          fi
          aqua i

      - name: Resolve IAM roles
        id: resolve-role
        shell: bash
        run: |
          ROLE_PLAN="${{ inputs.iam_role_plan }}"
          ROLE_APPLY="${{ inputs.iam_role_apply }}"
          if [ -z "$ROLE_PLAN" ] && [ -z "$ROLE_APPLY" ]; then
            if [ -n "${{ inputs.iam_role }}" ]; then
              echo "::warning::The 'iam_role' input is deprecated and will be removed in a future version. Please migrate to 'iam_role_plan' and 'iam_role_apply'."
              ROLE_PLAN="${{ inputs.iam_role }}"
              ROLE_APPLY="${{ inputs.iam_role }}"
            else
              echo "::error::Either 'iam_role_plan'/'iam_role_apply' or deprecated 'iam_role' must be provided."
              exit 1
            fi
          fi
          echo "role_plan=${ROLE_PLAN:-${{ inputs.iam_role }}}" >> "$GITHUB_OUTPUT"
          echo "role_apply=${ROLE_APPLY:-${{ inputs.iam_role }}}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS Credentials (Plan)
        if: github.event_name != 'push' || github.ref_name != 'main'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ steps.resolve-role.outputs.role_plan }}
          aws-region: ${{ inputs.region }}

      - name: Configure AWS Credentials (Apply)
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ steps.resolve-role.outputs.role_apply }}
          aws-region: ${{ inputs.region }}

      - name: set-tf-version
        id: set-tf-version
        working-directory: .
        run: |
          version_file="${{ inputs.terraform_version_file }}"
          if [ -f "$version_file" ]; then
            version=$(cat "$version_file")
          else
            version="latest"
          fi
          echo "terraform_version=$version" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.set-tf-version.outputs.terraform_version }}

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive

      - name: Configure git credentials for private modules
        if: inputs.configure_git_credentials
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        run: |
          tfcmt -var "target:${{ inputs.identifier }}" plan -patch -- terraform plan -no-color -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json
          if [ "${{ inputs.save_tfplan }}" = "true" ]; then
            artifact_name="tfplan-${{ github.workflow }}-${{ inputs.identifier }}-${{ github.run_id }}"
            echo "tfplan_artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Terraform Plan Artifact
        if: inputs.save_tfplan && (github.event_name != 'push' || github.ref_name != 'main')
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: tfplan-${{ github.workflow }}-${{ inputs.identifier }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan.json
          retention-days: ${{ inputs.tfplan_retention_days }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        run: tfcmt -var "target:${{ inputs.identifier }}" apply -- terraform apply -no-color -auto-approve -input=false

name: terraform-github
on:
  workflow_call:
    inputs:
      enable_aqua_cache:
        type: boolean
        required: false
        default: false
      working_directory:
        type: string
        required: false
        default: "."
      project:
        type: string
        required: false
        default: "github"
      # GCP config: currently only support GCS backend
      workload_identity_provider:
        type: string
        required: false
      service_account:
        description: "(Deprecated) Use 'service_account_plan' and 'service_account_apply' instead. Will be removed in a future version."
        type: string
        required: false
      service_account_plan:
        description: "GCP service account email for terraform plan (GCS backend)"
        type: string
        required: false
      service_account_apply:
        description: "GCP service account email for terraform apply (GCS backend)"
        type: string
        required: false
      terraform_version_file:
        type: string
        required: false
        default: ".terraform-version" # use 'latest' if not exists
      save_tfplan:
        type: boolean
        required: false
        default: false
      tfplan_retention_days:
        type: number
        required: false
        default: 1
      configure_git_credentials:
        description: "Configure git credentials for private modules using GITHUB_TOKEN"
        type: boolean
        required: false
        default: false
    outputs:
      tfplan_artifact_name:
        description: "Name of the artifact containing terraform plan JSON"
        value: ${{ jobs.terraform.outputs.tfplan_artifact_name }}
    secrets:
      # GitHub App
      gh_app_id:
        required: true
      gh_private_key:
        required: true

concurrency:
  group: terraform-github-${{ inputs.project }}
  cancel-in-progress: false

jobs:
  terraform:
    permissions:
      issues: write # allow to create repo label
      contents: read
      id-token: write
      pull-requests: write
    runs-on: ubuntu-latest
    outputs:
      tfplan_artifact_name: ${{ steps.plan.outputs.tfplan_artifact_name }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Generate GitHub App Token
        id: github-app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.gh_app_id }}
          private-key: ${{ secrets.gh_private_key }}
          owner: ${{ github.repository_owner }}

      - uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        if: inputs.enable_aqua_cache
        with:
          path: ~/.local/share/aquaproj-aqua
          key: v2-aqua-installer-${{runner.os}}-${{runner.arch}}-${{hashFiles('aqua.yaml')}}
          restore-keys: |
            v2-aqua-installer-${{runner.os}}-${{runner.arch}}-

      - name: install aqua
        uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
        with:
          aqua_version: v2.51.2

      - name: install tfcmt via aqua
        env:
          GITHUB_TOKEN: ${{ secrets.github_token }}
        run: |
          if [ ! -f aqua.yaml ];then
            aqua init
            aqua g -i suzuki-shunsuke/tfcmt
          fi
          aqua i

      # For GCS bucket backend
      - name: Resolve service accounts
        id: resolve-sa
        shell: bash
        run: |
          SA_PLAN="${{ inputs.service_account_plan }}"
          SA_APPLY="${{ inputs.service_account_apply }}"
          if [ -z "$SA_PLAN" ] && [ -z "$SA_APPLY" ] && [ -n "${{ inputs.service_account }}" ]; then
            echo "::warning::The 'service_account' input is deprecated and will be removed in a future version. Please migrate to 'service_account_plan' and 'service_account_apply'."
            SA_PLAN="${{ inputs.service_account }}"
            SA_APPLY="${{ inputs.service_account }}"
          fi
          echo "sa_plan=${SA_PLAN:-${{ inputs.service_account }}}" >> "$GITHUB_OUTPUT"
          echo "sa_apply=${SA_APPLY:-${{ inputs.service_account }}}" >> "$GITHUB_OUTPUT"

      - id: 'auth-plan'
        name: 'Authenticate to Google Cloud (Plan)'
        if: github.event_name != 'push' || github.ref_name != 'main'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: 'true'
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ steps.resolve-sa.outputs.sa_plan }}

      - id: 'auth-apply'
        name: 'Authenticate to Google Cloud (Apply)'
        if: github.event_name == 'push' && github.ref_name == 'main'
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          create_credentials_file: 'true'
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ steps.resolve-sa.outputs.sa_apply }}

      - name: set-tf-version
        id: set-tf-version
        working-directory: .
        run: |
          version_file="${{ inputs.terraform_version_file }}"
          if [ -f "$version_file" ]; then
            version=$(cat "$version_file")
          else
            version="latest"
          fi
          echo "terraform_version=$version" >> "$GITHUB_OUTPUT"

      - uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: ${{ steps.set-tf-version.outputs.terraform_version }}

      - name: Terraform fmt
        id: fmt
        run: terraform fmt -check -recursive

      - name: Configure git credentials for private modules
        if: inputs.configure_git_credentials
        run: git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        if: github.event_name != 'push' || github.ref_name != 'main'
        env:
          # https://github.com/suzuki-shunsuke/tfcmt/blob/6cb66ca833829e713563b928f0b99f1401dd6677/pkg/notifier/github/client.go#L71-L79
          TFCMT_GITHUB_TOKEN: ${{ secrets.github_token }} # For tfcmt (permissions are set above)
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }} # For github provider (permissions are set for the GitHub app)
        run: |
          tfcmt -var "target:${{ inputs.project }}" plan -patch -- terraform plan -no-color -out=tfplan.binary
          terraform show -json tfplan.binary > tfplan.json
          if [ "${{ inputs.save_tfplan }}" = "true" ]; then
            artifact_name="tfplan-${{ github.workflow }}-${{ inputs.project }}-${{ github.run_id }}"
            echo "tfplan_artifact_name=$artifact_name" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Terraform Plan Artifact
        if: inputs.save_tfplan && (github.event_name != 'push' || github.ref_name != 'main')
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tfplan-${{ github.workflow }}-${{ inputs.project }}-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan.json
          retention-days: ${{ inputs.tfplan_retention_days }}

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          # https://github.com/suzuki-shunsuke/tfcmt/blob/6cb66ca833829e713563b928f0b99f1401dd6677/pkg/notifier/github/client.go#L71-L79
          TFCMT_GITHUB_TOKEN: ${{ secrets.github_token }} # For tfcmt (permissions are set above)
          GITHUB_TOKEN: ${{ steps.github-app-token.outputs.token }} # For github provider (permissions are set for the GitHub app)
        run: tfcmt -var "target:${{ inputs.project }}" apply -- terraform apply -no-color -auto-approve -input=false
